name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          # v0.1.0 -> 0 1 0
          VERSION=${TAG#v}
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          echo "major=$MAJOR" >> $GITHUB_OUTPUT
          echo "minor=$MINOR" >> $GITHUB_OUTPUT
          echo "patch=$PATCH" >> $GITHUB_OUTPUT

      - name: Determine version bump
        id: bump
        env:
          LATEST_TAG: ${{ steps.latest_tag.outputs.tag }}
        run: |
          # 前回タグからのコミットメッセージを取得
          COMMITS=$(git log $LATEST_TAG..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="none"

          # BREAKING CHANGE または ! があれば major
          if echo "$COMMITS" | grep -qE "(BREAKING CHANGE|^[a-z]+(\(.+\))?!:)"; then
            BUMP="major"
          # feat: があれば minor
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          # fix:, perf:, refactor: があれば patch
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "type=$BUMP" >> $GITHUB_OUTPUT

      - name: Calculate new version
        id: new_version
        if: steps.bump.outputs.type != 'none'
        env:
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
          MAJOR: ${{ steps.latest_tag.outputs.major }}
          MINOR: ${{ steps.latest_tag.outputs.minor }}
          PATCH: ${{ steps.latest_tag.outputs.patch }}
        run: |
          case $BUMP_TYPE in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="$MAJOR.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
              ;;
          esac
          echo "version=v$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create tag and release
        if: steps.bump.outputs.type != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_VERSION: ${{ steps.new_version.outputs.version }}
        run: |
          git tag "$NEW_VERSION"
          git push origin "$NEW_VERSION"
          gh release create "$NEW_VERSION" \
            --title "$NEW_VERSION" \
            --generate-notes
